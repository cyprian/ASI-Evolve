experiment_name: "cosmos_tokenizer_ci16_psnr"

api:
  provider: "openai"
  base_url: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  model: "gpt-5.5"
  temperature: 0.4
  top_p: 0.9
  max_tokens: 32768
  seed: 42
  timeout: 600
  retry_times: 3
  retry_delay: 5

logging:
  level: "INFO"
  console: true
  wandb:
    enabled: false
    offline: true
    project: "evolve"
    entity: "hz-czar-sjtu"

pipeline:
  agents:
    manager: false
    researcher: true
    engineer: true
    analyzer: true

  researcher:
    diff_based_evolution: false
    max_code_length: 20000

  max_retries:
    researcher: 3
    engineer: 1
    analyzer: 2

  engineer_timeout: 7200

  parallel:
    num_workers: 1

  sample_n: 3

  judge:
    enabled: false
    ratio: 0.2

cognition:
  storage_dir: "cognition_data"
  embedding:
    model: "sentence-transformers/all-MiniLM-L6-v2"
    dimension: 384
  faiss:
    index_type: "IP"
  retrieval:
    top_k: 5
    score_threshold: 0.3
  web_search:
    enabled: false

database:
  storage_dir: "database_data"
  max_size: 80
  embedding:
    model: "sentence-transformers/all-MiniLM-L6-v2"
    dimension: 384
  sampling:
    algorithm: "ucb1"
    ucb1_c: 1.414
  faiss:
    index_type: "IP"
